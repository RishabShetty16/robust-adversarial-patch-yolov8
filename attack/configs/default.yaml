experiment:
  name: baseline_patch_attack

seed: 42

device: auto

dataset:
  root: data/coco
  images: images
  labels: labels
  image_size: 640
  batch_size: 8
  shuffle: true
  workers: 4

model:
  weights: yolov8n.pt
  device: auto
  confidence: 0.25
  iou: 0.45

patch:
  size: 160
  initialization: gray
  clamp_min: 0.0
  clamp_max: 1.0

optimizer:
  name: AdamW
  lr: 0.03
  weight_decay: 0.0001
  iterations: 1000
  grad_clip: 5.0

attack:
  mode: suppression
  target_class: person

eot:
  enabled: true

logging:
  save_every: 100
  evaluate_every: 50

placement:
  mode: fixed
  x: 100
  y: 100